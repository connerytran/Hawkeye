

name: Deploy Pi Docker Image

on:                   
  push:
    branches:
      - main          

jobs:                 
  build:              
    runs-on: ubuntu-latest   
    steps:           

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Set up Docker Buildx  # Docker Buildx is needed for building multi-arch images
        uses: docker/setup-buildx-action@v3
      
      - name: Build and push Pi server image
        uses: docker/build-push-action@v3
        with:
          context: ./pi-server
          file: ./pi-server/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/hawkeye-pi-backend:latest